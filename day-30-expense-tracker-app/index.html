<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Day 30 - Expense Tracker App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Day 30: Expense Tracker App</h1>

  <form id="expense-form">
    <input type="text" id="description-input" placeholder="Description" />
    <input type="number" id="amount-input" placeholder="Amount" step="0.01" />
    <select id="category-input">
      <option value="Food">Food</option>
      <option value="Transport">Transport</option>
      <option value="Housing">Housing</option>
      <option value="Entertainment">Entertainment</option>
      <option value="Other">Other</option>
    </select>
    <button type="submit">Add Expense</button>
  </form>

  <p id="error-message"></p>

  <label for="filter-select">Filter by category:</label>
  <select id="filter-select">
    <option value="all">All</option>
    <option value="Food">Food</option>
    <option value="Transport">Transport</option>
    <option value="Housing">Housing</option>
    <option value="Entertainment">Entertainment</option>
    <option value="Other">Other</option>
  </select>

  <ul id="expense-list"></ul>

  <h2 id="total">Total: $0.00</h2>

  <script src="script.js"></script>
</body>
</html>
